[build]
# Gunakan Dockerfile khusus scheduler, bukan default Next.js build
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.scheduler"

[deploy]
# Long-running process — restart otomatis jika crash
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Health check tidak diperlukan untuk scheduler (bukan HTTP server)
healthcheckPath = ""
